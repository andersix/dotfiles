[general]
import = [
    "~/.config/alacritty/themes/active_theme.toml"
]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

[env]
COLORTERM = "truecolor"
TERM = "xterm-256color"

[font]
size = 12

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[scrolling]
history = 100000

[window]
decorations = "full"
dynamic_padding = false
dynamic_title = true

[window.padding]
x = 5
y = 5

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\r"

[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
command = { program = "/bin/sh", args = ["-lc", "~/.local/bin/alacritty-theme toggle"] }
